<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIN | Cómo usar</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-soft: #0f172a;
            --accent: #ffffff; 
            --text-dark: #1e293b;
            --white: #ffffff;
            --facebook: #1877F2;
            --instagram: #E4405F;
            --whatsapp: #25D366;
            --glass: rgba(255, 255, 255, 0.1);
            --blur: blur(15px);
        }

        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-soft);
            color: var(--white);
            scroll-behavior: smooth;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-background {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .hero-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.7));
            z-index: -1;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 15px;
            transition: 0.3s ease;
        }

        .logo-text { 
            font-size: 35px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -1px;
        }

        .logo-icons {
            display: flex;
            gap: 12px;
            font-size: 30px;
            color: var(--white);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-socials {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-socials a { font-size: 40px; transition: 0.3s; text-decoration: none; }
        .nav-socials .fa-whatsapp { color: var(--whatsapp); }
        .nav-socials .fa-facebook { color: var(--facebook); }
        .nav-socials .fa-instagram { color: var(--instagram); }

        .btn-pill {
            background: var(--white);
            color: var(--text-dark);
            padding: 12px 26px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-pill:hover {
            background: #000000;
            color: #ffffff;
            transform: scale(1.1);
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 100px 20px;
            text-align: center;
        }

        h1 { font-family: 'Quicksand', sans-serif; font-size: clamp(3rem, 10vw, 4rem); margin-bottom: 20px; }
        p { font-size: 1.2rem; max-width: 600px; color: #cbd5e1; margin-bottom: 40px; }

        @media (max-width: 768px) {
            nav { padding: 10px 4%; }
            .logo-text { font-size: 24px; }
            .nav-socials a { font-size: 22px; }
            .nav-right { gap: 10px; }
            .btn-pill { padding: 8px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video autoplay muted loop playsinline class="video-background">
            <source src="video4.mp4" type="video/mp4">
        </video>
    </div>
    <div class="hero-overlay"></div>

    <nav data-aos="fade-down">
        <a href="index.html" class="logo-container">
            <span class="logo-text">LUMIN</span>
            <div class="logo-icons">
                <i class="fa-solid fa-wifi"></i>
                <i class="fa-solid fa-house"></i>
            </div>
        </a>
        <div class="nav-right">
            <div class="nav-socials">
                <a href="https://wa.me/50376823148" target="_blank" class="fa-brands fa-whatsapp"></a>
                <a href="https://www.facebook.com/share/1H2RHATR38/" target="_blank" class="fa-brands fa-facebook"></a>
                <a href="https://www.instagram.com/lumin1_2026?igsh=MWpyeGZmN2treDFqZA==" target="_blank" class="fa-brands fa-instagram"></a>
            </div>
        </div>
    </nav>

    <div class="content">
        <h1 data-aos="zoom-in">Cómo usar LUMIN</h1>
        <p data-aos="fade-up" data-aos-delay="200">Pronto encontrarás aquí tutoriales y guías paso a paso para configurar tu hogar inteligente.</p>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
