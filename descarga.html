<html lang="es">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --bg-soft: #f8fafc;
            --accent: #ffffff;
            --accent-dark: #1e40af;
            --text-dark: #1e293b;
            --white: #ffffff;
            --facebook: #1877F2;
            --instagram: #E4405F;
            --whatsapp: #25D366;
        }

        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-soft);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-optical-sizing: auto;
        }

        h1, h2, h3, .logo-text {
            font-weight: 700;
        }

        /* --- BARRA DE NAVEGACIÓN --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        /* LOGO NABLA CONSISTENTE */
        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 15px;
            transition: 0.3s ease;
        }

        .logo-container:hover {
            transform: scale(1.1);
        }

        .logo-text { 
            font-family: "Quicksand", sans-serif;
            font-size: 35px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -1px;
        }

        .logo-icons {
            display: flex;
            gap: 12px;
            font-size: 35px;
            color: var(--white);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-socials {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-socials a { font-size: 40px; transition: 0.3s; text-decoration: none; }
        .nav-socials .fa-whatsapp { color: var(--whatsapp); }
        .nav-socials .fa-facebook { color: var(--facebook); }
        .nav-socials .fa-instagram { color: var(--instagram); }
        .nav-socials a:hover { transform: scale(1.2); }

        /* --- CONTENIDO --- */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
        }

        .video-background {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .download-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--white);
        }

        .icon-box {
            font-size: 50px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .btn-main {
            display: block;
            background: var(--white);
            color: var(--text-dark);
            padding: 15px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 25px;
            transition: 0.3s;
        }

        .btn-main:hover {
            background: #000000;
            color: #ffffff;
            transform: scale(1.1);
        }

        /* --- AJUSTES PARA MÓVILES --- */
        @media (max-width: 768px) {
            nav { padding: 10px 4%; }
            .logo-text { font-size: 24px; }
            .logo-icons { font-size: 20px; }
            
            .nav-right { gap: 20px; }
            .nav-socials { 
                gap: 18px; 
            }
            .nav-socials a { font-size: 22px; }
            
            main { 
                padding: 100px 20px 40px; 
                align-items: flex-start; /* Ayuda a que quepa si el teclado se abre */
            }
            
            .download-card { 
                padding: 30px 20px; 
                border-radius: 25px; 
            }
            h2 { font-size: 22px; }
        }
    </style>
</head>
<body>

                <a href="https://www.instagram.com/lumin1_2026?igsh=MWpyeGZmN2treDFqZA==" target="_blank" class="fa-brands fa-instagram"></a>

    <main>

        <div class="hero-overlay"></div>

            <div class="icon-box">
                <i class="fa-solid fa-mobile-screen-button"></i>

            <h2>LUMIN App</h2>
            <p style="color: rgba(255,255,255,0.9); font-size: 15px;">Instala la aplicación oficial para gestionar tu dispositivo LUMIN.</p>
            
            <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 13px; color: rgba(255,255,255,0.7);">
                Archivo: <strong>LUMIN_v1.apk</strong><br>
                Tamaño: 69.95 MB
            </div>
            <a href="https://github.com/lumin-oficial/Web/releases/download/v1.0.0/lumin.apk" class="btn-main" style="display:inline-flex; align-items:center; justify-content:center; gap:8px;">
                <i class="fa-brands fa-android"></i>
                Descargar para Android
            </a>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>

    </script>
</body>
</html>
